<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test ASIR ONLINE - Da Vinci Albacete v2.20</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cyber: {
                            dark: '#0f172a',
                            panel: 'rgba(30, 41, 59, 0.7)',
                            neon: '#39ff14',
                            blue: '#00f0ff',
                            red: '#ff003c',
                            orange: '#ff8c00',
                            purple: '#b026ff',
                            yellow: '#facc15'
                        }
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(57, 255, 20, 0.5)',
                        'blue': '0 0 15px rgba(0, 240, 255, 0.5)',
                        'red': '0 0 15px rgba(255, 0, 60, 0.5)',
                        'orange': '0 0 15px rgba(255, 140, 0, 0.5)',
                        'purple': '0 0 15px rgba(176, 38, 255, 0.5)',
                        'yellow': '0 0 15px rgba(250, 204, 21, 0.5)',
                        'glass': '0 8px 32px 0 rgba(0, 0, 0, 0.37)'
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #0f172a;
            background-image:
                radial-gradient(at 0% 0%, hsla(253, 16%, 7%, 1) 0, transparent 50%),
                radial-gradient(at 50% 0%, hsla(225, 39%, 30%, 0.2) 0, transparent 50%),
                radial-gradient(at 100% 0%, hsla(339, 49%, 30%, 0.2) 0, transparent 50%);
            background-attachment: fixed;
            color: #e2e8f0;
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
        }

        .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0f172a;
        }

        ::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #475569;
        }

        .transition-all-custom {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(5px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-fade-in {
            animation: fadeIn 0.4s ease-out forwards;
        }

        .option-btn {
            -webkit-tap-highlight-color: transparent;
        }
    </style>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body class="antialiased flex flex-col items-center py-6 md:py-10 px-4">

    <header class="w-full max-w-4xl text-center mb-8 md:mb-12 text-white">
        <h1
            class="text-3xl md:text-5xl font-bold mb-2 tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-cyber-blue to-cyber-neon drop-shadow-lg">
            Test ASIR ONLINE
        </h1>
        <p class="text-xs md:text-sm text-slate-400 tracking-widest uppercase">
            Da Vinci Albacete • v2.20
        </p>
    </header>

    <main class="w-full max-w-4xl flex flex-col gap-6" id="app-container">

        <!-- Pantalla de Selección de Curso -->
        <section id="course-selection-screen"
            class="glass-panel rounded-3xl p-6 md:p-10 shadow-glass flex flex-col gap-6 md:gap-8 animate-fade-in w-full max-w-4xl mx-auto">
            <h2 class="text-2xl md:text-3xl font-bold text-center text-white tracking-tight">Selecciona tu Curso</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 md:gap-6">
                <!-- Tarjeta 1º ASIR -->
                <button data-action="select-course" data-id="1-asir"
                    class="group relative overflow-hidden flex flex-col items-center justify-center p-8 md:p-12 rounded-3xl border border-slate-700 bg-slate-800/40 hover:bg-slate-700/80 transition-all shadow-glass hover:shadow-blue min-h-[200px] md:min-h-[260px]">
                    <div
                        class="absolute inset-0 bg-gradient-to-br from-cyber-blue/10 to-transparent opacity-0 group-hover:opacity-100 transition-opacity">
                    </div>
                    <span
                        class="text-5xl md:text-6xl mb-4 group-hover:scale-110 transition-transform duration-300">💻</span>
                    <h3
                        class="text-2xl md:text-4xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-slate-200 to-slate-400 group-hover:from-cyber-blue group-hover:to-white transition-all">
                        1º ASIR</h3>
                    <p
                        class="mt-4 text-slate-400 text-[10px] md:text-sm tracking-widest uppercase font-bold border border-slate-600 px-4 py-1.5 rounded-full group-hover:border-cyber-blue/50 group-hover:text-cyber-blue transition-colors">
                        Módulos Disponibles</p>
                </button>
                <!-- Tarjeta 2º ASIR -->
                <button data-action="select-course" data-id="2-asir"
                    class="group relative overflow-hidden flex flex-col items-center justify-center p-8 md:p-12 rounded-3xl border border-slate-700/50 bg-slate-800/20 hover:bg-slate-800/40 transition-all shadow-glass min-h-[200px] md:min-h-[260px]">
                    <span
                        class="text-5xl md:text-6xl mb-4 grayscale group-hover:grayscale-0 transition-all duration-300 transform group-hover:-translate-y-2">🚀</span>
                    <h3
                        class="text-2xl md:text-4xl font-bold text-slate-500 group-hover:text-slate-300 transition-colors">
                        2º ASIR</h3>
                    <p
                        class="mt-4 text-cyber-orange text-[10px] md:text-sm tracking-widest uppercase font-bold border border-cyber-orange/40 bg-cyber-orange/10 px-4 py-1.5 rounded-full">
                        Próximamente</p>
                </button>
            </div>

            <!-- Alerta Próximamente -->
            <div id="coming-soon-alert"
                class="hidden p-4 rounded-xl border border-cyber-orange/50 bg-cyber-orange/10 flex items-center justify-center gap-3 animate-fade-in shadow-[0_0_15px_rgba(255,140,0,0.2)]">
                <span class="text-lg">🚧</span>
                <p class="text-cyber-orange text-sm md:text-base font-bold tracking-wide text-center">¡Módulos de 2º
                    curso próximamente!</p>
            </div>
        </section>

        <!-- Pantalla de Selección de Módulos (Antiguo Dashboard) -->
        <section id="module-selection-screen"
            class="hidden glass-panel rounded-3xl p-6 md:p-10 shadow-glass flex flex-col gap-6 md:gap-8 animate-fade-in w-full max-w-4xl mx-auto">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 pb-4 border-b border-slate-700/50">
                <button id="btn-back-courses"
                    class="w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-2.5 rounded-lg bg-slate-800/80 text-cyber-blue hover:text-cyber-neon hover:bg-slate-700 border border-slate-600 hover:border-cyber-neon transition-all text-xs uppercase tracking-wider font-bold shadow-md">
                    <span>←</span> VOLVER A CURSOS
                </button>
                <h2 class="text-xl md:text-2xl font-bold text-white text-center">1º ASIR - Módulos</h2>
            </div>
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 md:gap-5" id="subject-buttons">
                <!-- Inyectado por JS -->
            </div>
        </section>

        <!-- Navegación por Subniveles -->
        <section id="level-selection-screen"
            class="hidden glass-panel rounded-3xl p-6 md:p-8 shadow-glass flex flex-col gap-6 animate-fade-in w-full max-w-2xl mx-auto">
            <div class="flex flex-col sm:flex-row justify-between items-center gap-4 pb-4 border-b border-slate-700/50">
                <button id="btn-back-menu"
                    class="w-full sm:w-auto flex items-center justify-center gap-2 px-6 py-2.5 rounded-lg bg-slate-800/80 text-cyber-blue hover:text-cyber-neon hover:bg-slate-700 border border-slate-600 hover:border-cyber-neon transition-all text-xs uppercase tracking-wider font-bold shadow-md">
                    <span>←</span> VOLVER
                </button>
                <h3 id="level-title" class="text-lg md:text-xl font-bold text-white text-center sm:text-right"></h3>
            </div>
            <div id="level-list-container" class="grid gap-3 max-h-[50vh] overflow-y-auto pr-2">
                <!-- Inyectado por JS -->
            </div>
        </section>

        <!-- Pantalla del Test -->
        <section id="test-screen" class="hidden flex flex-col gap-4 md:gap-6 w-full max-w-3xl mx-auto animate-fade-in">
            <div class="glass-panel rounded-2xl p-4 md:p-6 shadow-glass flex flex-col gap-4">
                <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-3">
                    <div class="flex flex-col">
                        <span id="test-breadcrumbs" class="text-[10px] md:text-xs text-slate-400 tracking-wider">Módulo
                            > Tema</span>
                        <span id="subject-title"
                            class="text-sm md:text-base text-cyber-blue uppercase tracking-widest font-bold"></span>
                    </div>
                    <span id="score-display"
                        class="text-xs md:text-sm bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700 text-cyber-neon shadow-sm">Puntos:
                        0</span>
                </div>
                <div class="w-full bg-slate-800 rounded-full h-2.5 relative overflow-hidden shadow-inner">
                    <div id="progress-bar"
                        class="bg-gradient-to-r from-cyber-blue to-cyber-neon h-2.5 rounded-full transition-all duration-500 ease-out"
                        style="width: 0%"></div>
                </div>
                <div class="flex justify-between text-[10px] md:text-xs text-slate-400 font-medium tracking-wide">
                    <span id="current-test-name">Test Activo</span>
                    <span>Pregunta <span id="current-q-num" class="text-slate-200">0</span> de <span id="total-q-num"
                            class="text-slate-200">0</span></span>
                </div>
            </div>

            <div class="glass-panel rounded-3xl p-6 md:p-8 shadow-glass transition-all-custom" id="question-container">
                <h3 id="question-text"
                    class="text-base md:text-xl font-medium leading-relaxed mb-6 md:mb-8 text-white min-h-[3rem]"></h3>
                <div id="options-container" class="flex flex-col gap-3">
                    <!-- Inyectado por JS -->
                </div>
            </div>

            <div class="flex justify-center mt-2">
                <button id="btn-abandon"
                    class="px-6 py-3 rounded-xl bg-slate-800/50 text-slate-400 hover:text-white transition-colors border border-slate-700 text-[10px] md:text-xs font-bold uppercase tracking-widest">
                    Abandonar Test
                </button>
            </div>

            <!-- Botón invisible para disparar el evento de siguiente cuando sea necesario -->
            <button id="btn-next" class="hidden"></button>
        </section>

        <!-- Pantalla de Resultados -->
        <section id="result-screen"
            class="hidden glass-panel rounded-3xl p-6 md:p-8 shadow-glass flex flex-col items-center justify-start gap-4 text-center animate-fade-in w-full max-w-4xl mx-auto mt-4 mb-10">
            <h2 class="text-2xl md:text-3xl font-bold text-white mb-2 tracking-tight">Reporte Finalizado</h2>
            <div id="score-circle-container"
                class="w-32 h-32 md:w-36 md:h-36 rounded-full border-4 flex items-center justify-center shadow-glass transition-all bg-slate-900/50 backdrop-blur-sm shrink-0">
                <span id="final-score" class="text-4xl md:text-5xl font-bold">0%</span>
            </div>
            <p id="final-message" class="text-base md:text-lg text-slate-300 font-medium"></p>

            <div id="detailed-results-container" class="w-full text-left flex flex-col gap-4 mt-4 mb-4">
                <!-- Inyectado por JS -->
            </div>

            <div class="flex flex-col sm:flex-row gap-4 mt-4 w-full justify-center">
                <button id="btn-repeat-mistakes"
                    class="hidden w-full sm:w-auto px-6 py-3.5 rounded-xl bg-slate-800 border border-cyber-red text-cyber-red hover:bg-slate-700 font-bold uppercase tracking-wider text-xs md:text-sm transition-all">
                    Repetir Fallos
                </button>
                <button id="btn-restart-test"
                    class="w-full sm:w-auto px-6 py-3.5 rounded-xl bg-slate-700 hover:bg-slate-600 border border-slate-500 transition-colors text-white font-bold uppercase tracking-wider text-xs md:text-sm">
                    Test Completo
                </button>
                <button id="btn-restart-home"
                    class="w-full sm:w-auto px-6 py-3.5 rounded-xl bg-gradient-to-r from-cyber-blue to-blue-600 hover:from-blue-500 hover:to-cyber-dark text-white border border-transparent transition-all shadow-blue font-bold uppercase tracking-wider text-xs md:text-sm">
                    Volver al Tema
                </button>
            </div>
        </section>

    </main>

    <script type="module" src="./js/app2.js?v=2.20"></script>
</body>

</html>
